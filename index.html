<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <meta name="apple-mobile-web-app-title" content="Mimi Adventure"/>

  <link rel="manifest" href="data:application/json,{%22name%22:%22Mimi%20Adventure%22,%22short_name%22:%22Mimi%22,%22display%22:%22fullscreen%22,%22background_color%22:%22%231a0e2e%22,%22theme_color%22:%22%23b85080%22}"/>
  <title>Mimi Adventure 🐱</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#0e0520;}
    body{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;font-family:Georgia,serif;}
    /* NO CSS width/height on canvas — iOS Safari bug fix */
    #gc{position:fixed;top:0;left:0;display:block;}

    #hud{
      position:fixed;top:0;left:0;right:0;
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 18px 8px;
      padding-top:max(10px,env(safe-area-inset-top));
      background:rgba(12,4,24,0.84);
      border-bottom:1px solid rgba(255,140,200,0.18);
      z-index:30;pointer-events:none;
    }
    .hi{font-size:17px;font-weight:bold;letter-spacing:.04em;}
    #hl{color:#ff8ec8;} #hs{color:#ffe060;}
    #ht{color:rgba(255,210,240,0.45);font-size:11px;font-style:italic;letter-spacing:.08em;}

    /* Mute button */
    #mute-btn{
      position:fixed;top:0;right:14px;
      padding-top:max(10px,env(safe-area-inset-top));
      font-size:22px;cursor:pointer;z-index:40;
      background:none;border:none;line-height:2;
      -webkit-tap-highlight-color:transparent;
    }

    #controls{
      position:fixed;bottom:0;left:0;right:0;height:160px;
      display:flex;justify-content:space-between;align-items:flex-end;

      padding-bottom:max(16px,env(safe-area-inset-bottom));
      pointer-events:none;z-index:30;
    }
    .dpad{display:flex;gap:10px;pointer-events:all;}
    .btn{
      width:66px;height:66px;border-radius:50%;
      border:2px solid rgba(255,180,220,0.28);
      background:rgba(45,12,50,0.78);
      display:flex;align-items:center;justify-content:center;
      font-size:27px;pointer-events:all;
      -webkit-tap-highlight-color:transparent;
      box-shadow:0 3px 16px rgba(0,0,0,0.55);
      -webkit-transform:translateZ(0);transform:translateZ(0);
    }
    .btn.on{background:rgba(160,38,108,0.85);transform:scale(0.87) translateZ(0);}
    #bj{width:80px;height:80px;font-size:33px;background:rgba(130,28,88,0.82);border-color:rgba(255,130,195,0.42);}

<script>
'use strict';
/* ================================================================
   Mimi Adventure 🐱  – with Web Audio API Music & SFX
   iOS Safari compatible. No external assets. Single file.
   ================================================================ */

// ─── Canvas ───────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let CW = 375, CH = 667;

function resize(){
  const w = window.innerWidth  || document.documentElement.clientWidth  || 375;
  const h = window.innerHeight || document.documentElement.clientHeight || 667;
  if(w>10&&h>10){CW=w;CH=h;}
  canvas.width=CW; canvas.height=CH;
}

// ═══════════════════════════════════════════════════════════
//  🎵  AUDIO ENGINE  (Web Audio API, zero external files)
// ═══════════════════════════════════════════════════════════
let actx = null;   // AudioContext — created on first user gesture (iOS requirement)
let muted = false;
let bgmNodes = []; // refs so we can stop BGM

// Mute toggle button
const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click', toggleMute);
muteBtn.addEventListener('touchstart', e => { e.preventDefault(); toggleMute(); }, {passive:false});

function toggleMute(){
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(actx){
    // iOS: suspend/resume context to truly mute
    if(muted){ stopBGM(); }
    else { startBGM(); }
  }
}

// Create AudioContext on first touch/click (iOS policy)
function ensureAudio(){
  if(actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e){ actx = null; }
}

// ── Master volume helper ──────────────────────────────────
function masterGain(val=0.18){
  const g = actx.createGain();
  g.gain.value = muted ? 0 : val;
  g.connect(actx.destination);
  return g;
}

// ── Basic oscillator note ─────────────────────────────────
// type: 'sine'|'square'|'triangle'|'sawtooth'
function playNote(freq, dur, vol=0.12, type='sine', delay=0, detune=0){
  if(!actx || muted) return;
  const now = actx.currentTime + delay;
  const osc = actx.createOscillator();
  const gn  = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  osc.detune.setValueAtTime(detune, now);
  gn.gain.setValueAtTime(vol, now);
  gn.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(gn); gn.connect(actx.destination);
  osc.start(now); osc.stop(now + dur + 0.05);
}

// ── SFX ──────────────────────────────────────────────────

function sfxJump(){
  if(!actx||muted) return;
  // Rising chirp
  const now=actx.currentTime;
  const osc=actx.createOscillator(), g=actx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(280,now);
  osc.frequency.exponentialRampToValueAtTime(560,now+0.12);
  g.gain.setValueAtTime(0.18,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+0.18);
  osc.connect(g);g.connect(actx.destination);
  osc.start(now);osc.stop(now+0.22);
}

function sfxCollect(){
  if(!actx||muted) return;
  // Bright sparkle arpeggio
  [523,659,784,1047].forEach((f,i)=>playNote(f,0.1,0.13,'sine',i*0.045));
}

function sfxStomp(){
  if(!actx||muted) return;
  // Thump + high chirp
  const now=actx.currentTime;
  // Low thump
  const o1=actx.createOscillator(),g1=actx.createGain();
  o1.type='sine';
  o1.frequency.setValueAtTime(120,now);
  o1.frequency.exponentialRampToValueAtTime(40,now+0.15);
  g1.gain.setValueAtTime(0.3,now);
  g1.gain.exponentialRampToValueAtTime(0.0001,now+0.18);
  o1.connect(g1);g1.connect(actx.destination);
  o1.start(now);o1.stop(now+0.2);
  // High chirp
  playNote(880,0.08,0.1,'square',0.02);
}

function sfxHurt(){
  if(!actx||muted) return;
  // Descending buzz
  const now=actx.currentTime;
  const osc=actx.createOscillator(),g=actx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(440,now);
  osc.frequency.exponentialRampToValueAtTime(110,now+0.3);
  g.gain.setValueAtTime(0.22,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+0.35);
  osc.connect(g);g.connect(actx.destination);
  osc.start(now);osc.stop(now+0.38);
}

function sfxWin(){
  if(!actx||muted) return;
  // Triumphant arpeggio
  const melody=[523,659,784,1047,1319,1568];
  melody.forEach((f,i)=>playNote(f,0.18,0.15,'sine',i*0.1));
  // Final chord
  [523,659,784].forEach(f=>playNote(f,0.6,0.12,'sine',0.65));
}

function sfxGameOver(){
  if(!actx||muted) return;
  // Sad descending melody
  [494,440,392,349,330].forEach((f,i)=>playNote(f,0.22,0.14,'triangle',i*0.14));
}

function sfxLand(){
  if(!actx||muted) return;
  const now=actx.currentTime;
  const buf=actx.createBuffer(1,actx.sampleRate*0.06,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.5;
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.value=0.12;
  src.connect(g);g.connect(actx.destination);
  src.start(now);
}

// ── Background Music ──────────────────────────────────────
// Cute looping chiptune melody generated with oscillators
// Scale: C major pentatonic → [C,D,E,G,A] = [261,294,330,392,440,523,587,659,784,880]
const BGM_MELODY = [
  // Bar 1 – main theme
  [523,0.18],[659,0.18],[784,0.18],[880,0.18],[784,0.18],[659,0.18],[523,0.36],
  // Bar 2
  [440,0.18],[523,0.18],[659,0.18],[784,0.18],[659,0.18],[523,0.18],[440,0.36],
  // Bar 3 – high run
  [523,0.12],[587,0.12],[659,0.12],[784,0.12],[880,0.12],[1047,0.24],[880,0.12],[784,0.36],
  // Bar 4 – resolve
  [659,0.18],[587,0.18],[523,0.18],[440,0.18],[392,0.18],[330,0.18],[262,0.54],
];

const BGM_BASS = [
  // Simple walking bass line (plays simultaneously)
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[110,0.72],
];

let bgmScheduled = false;
let bgmTimeout   = null;

function scheduleMelody(notes, startTime, vol, type){
  if(!actx) return 0;
  let t = startTime;
  for(const [freq, dur] of notes){
    if(!muted){
      const osc = actx.createOscillator();
      const gn  = actx.createGain();
      osc.type  = type;
      osc.frequency.setValueAtTime(freq, t);
      gn.gain.setValueAtTime(vol, t);
      gn.gain.setValueAtTime(vol, t + dur - 0.02);
      gn.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(gn); gn.connect(actx.destination);
      osc.start(t); osc.stop(t + dur + 0.01);
      bgmNodes.push(osc);
    }
    t += dur;
  }
  return t; // total duration
}

function startBGM(){
  if(!actx || muted || bgmScheduled) return;
  bgmScheduled = true;
  scheduleBGMLoop();
}

function scheduleBGMLoop(){
  if(!actx || muted){ bgmScheduled=false; return; }
  const now = actx.currentTime;
  const melEnd = scheduleMelody(BGM_MELODY, now, 0.10, 'triangle');
  scheduleMelody(BGM_BASS,   now, 0.07, 'sine');
  // Add simple percussion (hi-hat noise)
  for(let b=0;b<8;b++){
    const bt = now + b * (melEnd/8);
    const buf = actx.createBuffer(1, actx.sampleRate*0.04, actx.sampleRate);
    const d   = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.18;
    const src = actx.createBufferSource(), gn=actx.createGain();
    src.buffer=buf; gn.gain.value=muted?0:0.05;
    src.connect(gn);gn.connect(actx.destination);
    src.start(bt);
    bgmNodes.push(src);
  }
  // Schedule next loop
  const loopMs = melEnd * 1000 - 80;
  bgmTimeout = setTimeout(()=>{ if(!muted) scheduleBGMLoop(); else bgmScheduled=false; }, loopMs);
}

function stopBGM(){
  bgmScheduled = false;
  if(bgmTimeout){ clearTimeout(bgmTimeout); bgmTimeout=null; }
  bgmNodes.forEach(n=>{ try{n.stop();}catch(e){} });
  bgmNodes = [];
}

// ═══════════════════════════════════════════════════════════
//  🎮  GAME ENGINE
// ═══════════════════════════════════════════════════════════

const GRAV=0.48,JFORCE=-12.5,PSPD=3.8,ESPD=1.0,INVMS=1800;

let gst='title', score=0, lives=3;
const EL_L=document.getElementById('hl'), EL_S=document.getElementById('hs');
function hud(){ EL_L.textContent='🐾 '+lives; EL_S.textContent='🐟 '+score; }
hud();

// ── Input ─────────────────────────────────────────────────
const T={left:false,right:false,jump:false};
function bindBtn(id,key){
  const el=document.getElementById(id);
  const on =()=>{T[key]=true; el.classList.add('on');};
  const off=()=>{T[key]=false;el.classList.remove('on');};
  el.addEventListener('touchstart', e=>{e.preventDefault();on(); },{passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off);
}
bindBtn('bl','left');bindBtn('br','right');bindBtn('bj','jump');
const K={};
window.addEventListener('keydown',e=>K[e.code]=true);
window.addEventListener('keyup',  e=>K[e.code]=false);
const isL=()=>T.left ||K.ArrowLeft ||K.KeyA;
const isR=()=>T.right||K.ArrowRight||K.KeyD;
const isJ=()=>T.jump ||K.ArrowUp   ||K.KeyW||K.KeyZ||K.Space;

// ── Camera ────────────────────────────────────────────────
const cam={x:0,y:0};

// ── Level data ────────────────────────────────────────────
const LW=5800,GY=420;
const PLATS=[
  {x:0,   y:GY,w:680,h:28,c:'#6a3878'},{x:730, y:GY,w:380,h:28,c:'#6a3878'},
  {x:1160,y:GY,w:460,h:28,c:'#6a3878'},{x:1680,y:GY,w:330,h:28,c:'#6a3878'},
  {x:2080,y:GY,w:420,h:28,c:'#6a3878'},{x:2580,y:GY,w:380,h:28,c:'#6a3878'},
  {x:3040,y:GY,w:560,h:28,c:'#6a3878'},{x:3680,y:GY,w:480,h:28,c:'#6a3878'},
  {x:4240,y:GY,w:640,h:28,c:'#6a3878'},{x:4960,y:GY,w:840,h:28,c:'#6a3878'},
  {x:160, y:330,w:140,h:16,c:'#b85080'},{x:360, y:270,w:120,h:16,c:'#b85080'},
  {x:550, y:210,w:130,h:16,c:'#b85080'},{x:780, y:290,w:130,h:16,c:'#a04070'},
  {x:980, y:340,w:120,h:16,c:'#a04070'},{x:1200,y:310,w:140,h:16,c:'#b85080'},
  {x:1390,y:250,w:120,h:16,c:'#b85080'},{x:1540,y:190,w:130,h:16,c:'#b85080'},
  {x:1730,y:320,w:130,h:16,c:'#a04070'},{x:1910,y:260,w:120,h:16,c:'#a04070'},
  {x:2120,y:340,w:140,h:16,c:'#b85080'},{x:2310,y:280,w:120,h:16,c:'#b85080'},
  {x:2470,y:220,w:130,h:16,c:'#b85080'},{x:2640,y:330,w:130,h:16,c:'#a04070'},
  {x:2820,y:270,w:140,h:16,c:'#a04070'},{x:3080,y:310,w:140,h:16,c:'#b85080'},
  {x:3270,y:240,w:120,h:16,c:'#b85080'},{x:3440,y:180,w:130,h:16,c:'#b85080'},
  {x:3730,y:320,w:130,h:16,c:'#a04070'},{x:3910,y:250,w:120,h:16,c:'#a04070'},
  {x:4280,y:340,w:140,h:16,c:'#b85080'},{x:4470,y:270,w:130,h:16,c:'#b85080'},
  {x:4660,y:200,w:140,h:16,c:'#b85080'},{x:5020,y:320,w:140,h:16,c:'#a04070'},
  {x:5210,y:250,w:130,h:16,c:'#a04070'},{x:5400,y:180,w:160,h:16,c:'#a04070'},
  {x:5620,y:300,w:150,h:16,c:'#b85080'},
];
const EDEFS=[
  {pi:2,ox:30,d:1},{pi:5,ox:20,d:-1},{pi:8,ox:40,d:1},
  {pi:11,ox:10,d:-1},{pi:14,ox:20,d:1},{pi:17,ox:10,d:-1},
  {pi:20,ox:30,d:1},{pi:23,ox:10,d:-1},{pi:26,ox:20,d:1},
  {pi:29,ox:10,d:-1},{pi:32,ox:20,d:1},{pi:35,ox:10,d:-1},
  {pi:0,ox:180,d:1},{pi:1,ox:60,d:-1},{pi:3,ox:40,d:1},
  {pi:6,ox:120,d:-1},{pi:9,ox:200,d:1},
];
const SDEFS=[
  {x:180,y:308,t:0},{x:380,y:248,t:1},{x:570,y:188,t:0},
  {x:800,y:268,t:1},{x:1000,y:318,t:0},{x:1220,y:288,t:1},
  {x:1410,y:228,t:0},{x:1560,y:168,t:1},{x:1750,y:298,t:0},
  {x:1930,y:238,t:1},{x:2140,y:318,t:0},{x:2330,y:258,t:1},
  {x:2490,y:198,t:0},{x:2660,y:308,t:1},{x:2840,y:248,t:0},
  {x:3290,y:218,t:1},{x:3460,y:158,t:0},{x:4490,y:248,t:1},
  {x:4680,y:178,t:0},{x:5420,y:158,t:1},
];
const PCOL=['#e74c8a','#4cace7','#e7c04c','#7c4ce7','#4ce78a'];
const EW=20,EH=28,PW=28,PH=26,SW=18,SH=18;
let enemies=[],snacks=[];
const portal={x:5640,y:GY-60,w:52,h:60,at:0};

// ── Player ────────────────────────────────────────────────
let P={};
let wasOnGround=false; // for land SFX

function resetP(){
  P={x:50,y:GY-PH,vx:0,vy:0,w:PW,h:PH,
     onG:false,cj:true,fr:true,inv:0,alive:true,dt:0,tw:0};
  wasOnGround=false;
}
resetP();

function buildLevel(){
  enemies=EDEFS.map(d=>{
    const p=PLATS[d.pi];if(!p)return null;
    return{x:p.x+d.ox,y:p.y-EH,w:EW,h:EH,vx:ESPD*d.d,
           px:p.x,pw:p.w,alive:true,
           rot:Math.random()*Math.PI*2,
           rs:(0.025+Math.random()*0.03)*(Math.random()<.5?1:-1),
           col:PCOL[Math.floor(Math.random()*PCOL.length)]};
  }).filter(Boolean);
  snacks=SDEFS.map(s=>({x:s.x,y:s.y,w:SW,h:SH,type:s.t,done:false,bob:Math.random()*Math.PI*2}));
  portal.at=0;
}
buildLevel();

// ── Physics ───────────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function resolveP(e){
  e.onG=false;
  for(const p of PLATS){
    if(!overlap(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h))continue;
    const ol=(e.x+e.w)-p.x,or2=(p.x+p.w)-e.x,ot=(e.y+e.h)-p.y,ob=(p.y+p.h)-e.y;
    if(Math.min(ot,ob)<Math.min(ol,or2)){
      if(ot<ob){e.y=p.y-e.h;if(e.vy>0)e.vy=0;e.onG=true;}
      else{e.y=p.y+p.h;if(e.vy<0)e.vy=0;}
    }else{e.x=ol<or2?p.x-e.w:p.x+p.w;e.vx=0;}
  }
}

function dmg(){
  if(P.inv>0||!P.alive)return;
  sfxHurt();
  lives--;hud();
  if(lives<=0){gst='gameover';stopBGM();sfxGameOver();}
  else{P.alive=false;P.dt=1400;}
}
function respawn(){resetP();P.inv=INVMS;}

let jheld=false;
function updP(dt){
  if(!P.alive){P.dt-=dt;if(P.dt<=0)respawn();return;}
  if(P.inv>0)P.inv-=dt;
  P.tw+=dt*0.006;
  P.vx=0;
  if(isL()){P.vx=-PSPD;P.fr=false;}
  if(isR()){P.vx= PSPD;P.fr=true;}
  const jp=isJ();
  if(jp&&!jheld&&P.onG&&P.cj){P.vy=JFORCE;P.cj=false;sfxJump();}
  if(!jp){jheld=false;P.cj=true;}else jheld=true;
  const prevOnG=P.onG;
  P.vy+=GRAV;if(P.vy>16)P.vy=16;
  P.x+=P.vx;resolveP(P);
  P.y+=P.vy;resolveP(P);
  // Land sound: was in air, now on ground
  if(!prevOnG&&P.onG&&P.vy>=0) sfxLand();
  if(P.y>GY+200)dmg();
  if(P.x<0)P.x=0;if(P.x+P.w>LW)P.x=LW-P.w;
}
function updE(dt){
  for(const e of enemies){
    if(!e.alive)continue;
    e.rot+=e.rs*dt;e.x+=e.vx;
    if(e.x<=e.px||e.x+e.w>=e.px+e.pw){e.vx*=-1;e.x=Math.max(e.px,Math.min(e.x,e.px+e.pw-e.w));}
    if(!P.alive||P.inv>0)continue;
    if(overlap(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h)){
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.45){e.alive=false;P.vy=JFORCE*0.65;score+=5;hud();sfxStomp();}
      else dmg();
    }
  }
}
function updS(){
  for(const s of snacks){
    if(s.done)continue;
    if(P.alive&&overlap(P.x,P.y,P.w,P.h,s.x,s.y,s.w,s.h)){s.done=true;score+=10;hud();sfxCollect();}
  }
}
function updPortal(){
  if(P.alive&&overlap(P.x,P.y,P.w,P.h,portal.x,portal.y,portal.w,portal.h)){
    gst='win';stopBGM();sfxWin();
  }
}
function updCam(){
  const sc=scl(),vw=CW/sc,vh=CH/sc;
  cam.x=Math.max(0,Math.min(P.x-vw/2+P.w/2,LW-vw));
  cam.y=Math.max(0,Math.min(P.y-vh*0.55,GY+40-vh));
}

// ── Scale helpers ─────────────────────────────────────────
function scl(){return Math.min(CW/800,CH/490);}
function wx(v){return(v-cam.x)*scl();}
function wy(v){return(v-cam.y)*scl();}
function ws(v){return v*scl();}

// ── Draw helpers ──────────────────────────────────────────
function rrect(x,y,w,h,r,fill,stroke,lw){
  if(w<=0||h<=0)return;
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1.5;ctx.stroke();}
}

// ── Draw background ───────────────────────────────────────
function drawBG(t){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#0e0520');g.addColorStop(0.6,'#1e0a30');g.addColorStop(1,'#2a1040');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  // Moon
  const mx=CW*0.75-(cam.x*0.04%(CW*0.3));
  const my=CH*0.17,mr=ws(33);
  const mg=ctx.createRadialGradient(mx,my,mr*0.1,mx,my,mr);
  mg.addColorStop(0,'#fffae0');mg.addColorStop(0.7,'#ffe880');mg.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
  // Stars
  const stars=[[60,28],[200,45],[350,18],[490,60],[650,32],[780,55],
               [120,100],[280,85],[450,115],[610,78],[40,155],[220,135],[400,158]];
  const px2=cam.x*0.10;
  for(const[sx,sy]of stars){
    const tw=0.35+0.65*Math.abs(Math.sin(t*0.0004+sx*0.1));
    ctx.globalAlpha=tw;ctx.fillStyle='#fff';
    for(let ti=0;ti<6;ti++){
      const rx=((sx+ti*900-px2)%CW+CW)%CW;
      ctx.beginPath();ctx.arc(rx,sy,1.1,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  // Distant trees
  const gmx=cam.x*0.15;
  ctx.fillStyle='rgba(38,12,62,0.5)';
  for(let i=0;i<14;i++){
    const bx=i*420;
    const rx=((bx-gmx%(LW+420))%(CW+440)+CW+440)%(CW+440)-220;
    const bh=48+(i%3)*16;
    ctx.fillRect(rx-3,CH-bh,6,bh);
    ctx.beginPath();ctx.moveTo(rx-16,CH-bh+6);ctx.lineTo(rx,CH-bh-22);ctx.lineTo(rx+16,CH-bh+6);ctx.closePath();ctx.fill();
  }
}

// ── Draw platforms ────────────────────────────────────────
function drawPlats(){
  for(const p of PLATS){
    const sx=wx(p.x),sy=wy(p.y),sw=ws(p.w),sh=ws(p.h);
    if(sx+sw<0||sx>CW)continue;
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(sx+3,sy+5,sw,sh);
    rrect(sx,sy,sw,sh,5,p.c,'rgba(0,0,0,0.3)');
    ctx.fillStyle='rgba(255,200,230,0.15)';ctx.fillRect(sx+4,sy+3,sw-8,3);
    if(p.h===28){
      ctx.fillStyle='rgba(255,155,200,0.38)';
      for(let i=22;i<p.w-22;i+=48){
        const gx=wx(p.x+i),gy=sy+7;
        if(gx<0||gx>CW)continue;
        ctx.beginPath();ctx.arc(gx,gy,ws(3),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(gx-ws(3.8),gy-ws(2.8),ws(1.6),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(gx+ws(3.8),gy-ws(2.8),ws(1.6),0,Math.PI*2);ctx.fill();
      }
    }
  }
}

// ── Draw pill enemies ─────────────────────────────────────
function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    const sx=wx(e.x),sy=wy(e.y),sw=ws(e.w),sh=ws(e.h);
    if(sx+sw<0||sx>CW)continue;
    const cx2=sx+sw/2,cy2=sy+sh/2;
    ctx.save();ctx.translate(cx2,cy2);ctx.rotate(e.rot);
    const pr=ws(8.5),ph=ws(12);
    ctx.fillStyle='#f2f2f2';
    ctx.beginPath();ctx.arc(0,-ph/2,pr,Math.PI,0);ctx.rect(-pr,-ph/2,pr*2,ph);ctx.arc(0,ph/2,pr,0,Math.PI);ctx.fill();
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.arc(0,ph/2,pr,0,Math.PI);ctx.rect(-pr,0,pr*2,ph/2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=ws(1.2);
    ctx.beginPath();ctx.moveTo(-pr,0);ctx.lineTo(pr,0);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=ws(1.2);
    ctx.beginPath();ctx.arc(0,-ph/2,pr,Math.PI,0);ctx.lineTo(pr,ph/2);ctx.arc(0,ph/2,pr,0,Math.PI);ctx.lineTo(-pr,-ph/2);ctx.stroke();
    ctx.strokeStyle=e.col+'66';ctx.lineWidth=ws(2.5);
    ctx.beginPath();ctx.arc(0,0,pr*1.15,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ── Draw snacks ───────────────────────────────────────────
function drawSnacks(t){
  for(const s of snacks){
    if(s.done)continue;
    const sx=wx(s.x),sy=wy(s.y);
    if(sx+ws(s.w)<0||sx>CW)continue;
    const bob=Math.sin(s.bob+t*0.002)*ws(2.5);
    const cx2=sx+ws(s.w)/2,cy2=sy+ws(s.h)/2+bob;
    ctx.save();ctx.translate(cx2,cy2);
    if(s.type===0){
      // Fish
      ctx.shadowColor='#40c0ff';ctx.shadowBlur=ws(7);
      const fg=ctx.createRadialGradient(-ws(1),0,ws(1),0,0,ws(8));
      fg.addColorStop(0,'#b0eeff');fg.addColorStop(1,'#1890c0');
      ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,ws(8),ws(5),0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1880b0';ctx.beginPath();ctx.moveTo(ws(7),0);ctx.lineTo(ws(12),-ws(4));ctx.lineTo(ws(12),ws(4));ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-ws(4.5),-ws(1),ws(1.4),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-ws(4.1),-ws(1.4),ws(0.6),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.ellipse(-ws(2),-ws(1),ws(2),ws(1),0.5,0,Math.PI*2);ctx.fill();
    }else{
      // Star snack
      ctx.shadowColor='#ffdd00';ctx.shadowBlur=ws(9);
      ctx.fillStyle='#ffe020';ctx.strokeStyle='#ffaa00';ctx.lineWidth=ws(1.2);
      ctx.beginPath();
      for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,r=i%2===0?ws(9):ws(4.5);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,200,0.65)';ctx.beginPath();ctx.arc(0,0,ws(2.5),0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ── Draw portal ───────────────────────────────────────────
function drawPortal(t){
  const sx=wx(portal.x),sy=wy(portal.y),sw=ws(portal.w),sh=ws(portal.h);
  if(sx+sw<0||sx>CW)return;
  const cx2=sx+sw/2,pls=Math.sin(portal.at+t*0.002)*0.08+1;
  ctx.save();ctx.translate(cx2,sy+sh/2+sh*0.1);
  ctx.strokeStyle='rgba(255,180,80,0.13)';ctx.lineWidth=ws(16);
  ctx.beginPath();ctx.ellipse(0,0,sw*0.72*pls,sh*0.46*pls,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#d4b040';ctx.strokeStyle='#b09030';ctx.lineWidth=ws(2.5);
  ctx.beginPath();ctx.ellipse(0,sh*0.1,sw*0.68*pls,sh*0.4*pls,0,0,Math.PI);ctx.fill();ctx.stroke();
  ctx.fillStyle='#f0d060';ctx.strokeStyle='#c0a030';ctx.lineWidth=ws(2);
  ctx.beginPath();ctx.ellipse(0,sh*0.1,sw*0.68*pls,sh*0.17*pls,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#d06828';ctx.beginPath();ctx.ellipse(0,sh*0.04,sw*0.48*pls,sh*0.13*pls,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<3;i++){
    const ux=(i-1)*sw*0.2,uoff=Math.sin(t*0.003+i*1.2)*ws(3);
    ctx.strokeStyle=`rgba(255,235,190,${0.38-i*0.05})`;ctx.lineWidth=ws(2.2);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ux,-sh*0.06);ctx.quadraticCurveTo(ux+ws(7)+uoff,-sh*0.26,ux+uoff*0.4,-sh*0.42);ctx.stroke();
  }
  ctx.shadowColor='#ff8800';ctx.shadowBlur=ws(8);
  ctx.fillStyle='#fff';ctx.font=`bold ${ws(9)}px Georgia`;ctx.textAlign='center';
  ctx.fillText('FINISH! 🎉',0,sh*0.5+ws(13));ctx.shadowBlur=0;ctx.restore();
}

// ── Draw Mimi ─────────────────────────────────────────────
function drawMimi(t){
  if(!P.alive)return;
  if(P.inv>0&&Math.floor(t/80)%2===0)return;
  const sx=wx(P.x),sy=wy(P.y),sw=ws(P.w),sh=ws(P.h);
  const cx2=sx+sw/2,cy2=sy+sh/2,dir=P.fr?1:-1,mov=Math.abs(P.vx)>0.1;
  ctx.save();ctx.translate(cx2,cy2);ctx.scale(dir,1);
  // Tail
  const tw=Math.sin(P.tw)*(mov?0.5:0.22);
  ctx.strokeStyle='#dcdcdc';ctx.lineWidth=ws(4.5);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-ws(10),ws(5));ctx.quadraticCurveTo(-ws(18),ws(5)-ws(13)*Math.cos(tw),-ws(13)+Math.sin(tw)*ws(9),ws(5)-ws(19));ctx.stroke();
  ctx.strokeStyle='#c8c8c8';ctx.lineWidth=ws(6.5);ctx.beginPath();ctx.moveTo(-ws(10),ws(5));ctx.lineTo(-ws(12),ws(1));ctx.stroke();
  // Body
  ctx.fillStyle='#f8f8f8';ctx.strokeStyle='#d8d8d8';ctx.lineWidth=ws(0.9);
  ctx.beginPath();ctx.ellipse(0,ws(5),ws(11),ws(10),0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Head
  ctx.fillStyle='#ffffff';ctx.strokeStyle='#ddd';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.arc(0,-ws(9),ws(12),0,Math.PI*2);ctx.fill();ctx.stroke();
  // Ears
  ctx.fillStyle='#f2f2f2';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.moveTo(-ws(9),-ws(18));ctx.lineTo(-ws(14),-ws(27));ctx.lineTo(-ws(3),-ws(21));ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffb0ca';ctx.beginPath();ctx.moveTo(-ws(9.5),-ws(19));ctx.lineTo(-ws(13),-ws(25.5));ctx.lineTo(-ws(4),-ws(21.5));ctx.closePath();ctx.fill();
  ctx.fillStyle='#f2f2f2';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.moveTo(ws(9),-ws(18));ctx.lineTo(ws(14),-ws(27));ctx.lineTo(ws(3),-ws(21));ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffb0ca';ctx.beginPath();ctx.moveTo(ws(9.5),-ws(19));ctx.lineTo(ws(13),-ws(25.5));ctx.lineTo(ws(4),-ws(21.5));ctx.closePath();ctx.fill();
  // Eyes
  const ew=P.onG?ws(3.2):ws(4.3),eh=P.onG?ws(3.8):ws(5);
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.ellipse(-ws(4.5),-ws(10),ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ws(4.5),-ws(10),ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-ws(3.8),-ws(11.2),ws(1.2),0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ws(5.2),-ws(11.2),ws(1.2),0,Math.PI*2);ctx.fill();
  // Nose
  ctx.fillStyle='#ffaacc';ctx.beginPath();ctx.arc(0,-ws(7.5),ws(1.6),0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.strokeStyle='#aaa';ctx.lineWidth=ws(0.9);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-ws(2.5),-ws(6));ctx.quadraticCurveTo(0,-ws(4.5),ws(2.5),-ws(6));ctx.stroke();
  // Whiskers
  ctx.strokeStyle='rgba(120,120,120,0.45)';ctx.lineWidth=ws(0.7);
  ctx.beginPath();ctx.moveTo(-ws(2),-ws(7.5));ctx.lineTo(-ws(12),-ws(6));ctx.stroke();
  ctx.beginPath();ctx.moveTo(-ws(2),-ws(7));ctx.lineTo(-ws(12),-ws(8.5));ctx.stroke();
  ctx.beginPath();ctx.moveTo(ws(2),-ws(7.5));ctx.lineTo(ws(12),-ws(6));ctx.stroke();
  ctx.beginPath();ctx.moveTo(ws(2),-ws(7));ctx.lineTo(ws(12),-ws(8.5));ctx.stroke();
  // Legs
  const lo=mov?Math.sin(t*0.015)*ws(3.2):0;
  ctx.fillStyle='#efefef';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.ellipse(-ws(5),ws(14)+lo,ws(4),ws(3.5),0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(ws(5),ws(14)-lo,ws(4),ws(3.5),-0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Spots
  ctx.fillStyle='rgba(195,195,195,0.28)';
  ctx.beginPath();ctx.ellipse(ws(5),ws(3),ws(4),ws(3),0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-ws(4),ws(7),ws(3),ws(2.5),-0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Restart / tap ─────────────────────────────────────────
function restart(){
  score=0;lives=3;gst='playing';
  hud();resetP();buildLevel();cam.x=0;cam.y=0;
  stopBGM();
  // Small delay to let AudioContext settle on iOS
  setTimeout(()=>startBGM(), 100);
}

function handleTap(e){
  e.preventDefault();
  // CRITICAL for iOS: AudioContext must be created/resumed inside user gesture
  ensureAudio();
  if(actx && actx.state==='suspended') actx.resume();
  if(gst==='title'||gst==='gameover'||gst==='win') restart();
}
canvas.addEventListener('touchstart',handleTap,{passive:false});
canvas.addEventListener('click',handleTap);
window.addEventListener('keydown',e=>{
  ensureAudio();
  if((gst==='title'||gst==='gameover'||gst==='win')&&e.code==='KeyR') restart();
});

function setCtrl(v){document.getElementById('controls').style.display=v?'flex':'none';}

// ── Main loop ─────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,50);last=ts;
  if(gst==='title'){setCtrl(false);drawTitle();requestAnimationFrame(loop);return;}
  setCtrl(true);
  if(gst==='playing'){
    portal.at+=dt*0.002;
    updP(dt);updE(dt);updS();updPortal();updCam();
  }
  ctx.clearRect(0,0,CW,CH);
  drawBG(ts);drawPlats();drawPortal(ts);drawSnacks(ts);drawEnemies();drawMimi(ts);
  if(!P.alive&&P.dt>0){
    ctx.fillStyle=`rgba(255,50,80,${Math.min(0.4,P.dt/4000)})`;ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.font=`bold ${Math.min(CW*0.046,26)}px Georgia`;
    ctx.fillText('Mimi jatuh... 😿',CW/2,CH/2);
  }
  if(gst==='gameover'){setCtrl(false);drawOverlay('GAME OVER 😿',`Skor: ${score}  ·  Snack: ${score/10|0}`,'Ayo coba lagi, Mimi bisa!');}
  if(gst==='win'){setCtrl(false);drawOverlay('MIMI MENANG! 😸🎉',`Skor: ${score}  ·  Snack: ${score/10|0} 🐟`,'Nyam nyam! Semua snack habis!');}
  requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────
function init(){
  resize();
  if(CW<10||CH<10){CW=canvas.width=375;CH=canvas.height=667;}
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  document.addEventListener('touchstart',e=>{if(e.target===document.body)e.preventDefault();},{passive:false});
  requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});
}
if(document.readyState==='complete'){init();}else{window.addEventListener('load',init);}
window.addEventListener('resize',()=>resize());
window.addEventListener('orientationchange',()=>setTimeout(resize,200));
</script>
</body>
</html>
