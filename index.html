// ═══════════════════════════════════════════════════════════
//  🎵  AUDIO ENGINE
//  Key fix for GitHub Pages: AudioContext created lazily inside
//  user gesture handler only. Never auto-created on load.
// ═══════════════════════════════════════════════════════════
let AC  = null;   // AudioContext — created on first tap ONLY
let muted = false;
let bgmNodes = [];
let bgmTimer  = null;

const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click',       e=>{ e.stopPropagation(); toggleMute(); });
muteBtn.addEventListener('touchstart',  e=>{ e.preventDefault(); e.stopPropagation(); toggleMute(); },{passive:false});

function toggleMute(){
  muted=!muted;
  muteBtn.textContent=muted?'🔇':'🔊';
  if(muted){ stopBGM(); }
  else if(gst==='playing'){ startBGM(); }
}

// Call this inside EVERY user-gesture handler (tap/click/keydown)
function ensureAC(){
  if(AC) return true;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    return true;
  }catch(e){ return false; }
}

// Resume if suspended (iOS puts context to sleep when tab goes background)
function resumeAC(){
  if(AC && AC.state==='suspended') AC.resume();
}

// ── Low-level helpers ────────────────────────────────────

// Create a gain node connected to destination
function mkGain(vol){
  const g=AC.createGain(); g.gain.value=muted?0:vol; g.connect(AC.destination); return g;
}

// Play a simple oscillator note
function playNote(freq,dur,vol,type,delay){
  if(!AC||muted) return;
  const now=AC.currentTime+(delay||0);
  const o=AC.createOscillator(), g=mkGain(vol||0.1);
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,now);
  g.gain.setValueAtTime(vol||0.1,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
  o.connect(g); o.start(now); o.stop(now+dur+0.02);
}

// White-noise burst (for percussion / hiss texture)
function playNoise(dur,vol,delay){
  if(!AC||muted) return;
  const now=AC.currentTime+(delay||0);
  const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*dur),AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource();
  const g=mkGain(vol||0.08);
  // Shape with gain envelope
  g.gain.setValueAtTime(vol||0.08,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
  src.buffer=buf; src.connect(g); src.start(now); src.stop(now+dur+0.02);
}

// ── SFX ─────────────────────────────────────────────────

function sfxJump(){
  if(!AC||muted) return;
  // Rising sine chirp
  const now=AC.currentTime;
  const o=AC.createOscillator(),g=mkGain(0.15);
  o.type='sine';
  o.frequency.setValueAtTime(260,now);
  o.frequency.exponentialRampToValueAtTime(540,now+0.13);
  g.gain.setValueAtTime(0.15,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+0.16);
  o.connect(g);o.start(now);o.stop(now+0.18);
}

function sfxLand(){
  if(!AC||muted) return;
  playNoise(0.06,0.10);
}

// 😸 Cat MEOW — synthesized formant approximation
// Uses two oscillators with frequency glide: "mrrr-eow"
function sfxMeow(){
  if(!AC||muted) return;
  const now=AC.currentTime;

  // Main "meow" tone — starts mid, dips, rises, falls
  const o1=AC.createOscillator(), g1=mkGain(0.18);
  o1.type='triangle';
  o1.frequency.setValueAtTime(420, now);
  o1.frequency.linearRampToValueAtTime(380, now+0.06);
  o1.frequency.linearRampToValueAtTime(600, now+0.20);
  o1.frequency.exponentialRampToValueAtTime(300, now+0.42);
  g1.gain.setValueAtTime(0,now);
  g1.gain.linearRampToValueAtTime(0.18,now+0.04);
  g1.gain.setValueAtTime(0.18,now+0.28);
  g1.gain.exponentialRampToValueAtTime(0.0001,now+0.44);
  o1.connect(g1);o1.start(now);o1.stop(now+0.46);

  // Harmonic overlay for "cat-ness"
  const o2=AC.createOscillator(), g2=mkGain(0.07);
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(840, now);
  o2.frequency.linearRampToValueAtTime(760, now+0.06);
  o2.frequency.linearRampToValueAtTime(1200,now+0.20);
  o2.frequency.exponentialRampToValueAtTime(600, now+0.42);
  g2.gain.setValueAtTime(0,now);
  g2.gain.linearRampToValueAtTime(0.07,now+0.06);
  g2.gain.exponentialRampToValueAtTime(0.0001,now+0.44);
  o2.connect(g2);o2.start(now);o2.stop(now+0.46);

  // Sparkle collect sound on top
  [523,784,1047].forEach((f,i)=>playNote(f,0.09,0.10,'sine',i*0.04));
}

// 😾 Cat HISS — synthesized angry cat sound
function sfxHiss(){
  if(!AC||muted) return;
  const now=AC.currentTime;

  // Hiss: pitched noise + angry growl tone
  // Noise layer (filtered)
  const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*0.4),AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource();
  // Bandpass filter to shape noise into "ssss" hiss
  const bpf=AC.createBiquadFilter();
  bpf.type='bandpass'; bpf.frequency.value=3200; bpf.Q.value=1.2;
  const g1=mkGain(0.22);
  g1.gain.setValueAtTime(0.22,now);
  g1.gain.exponentialRampToValueAtTime(0.0001,now+0.38);
  src.buffer=buf;src.connect(bpf);bpf.connect(g1);src.start(now);src.stop(now+0.4);

  // Low growl underneath: descending sawtooth
  const o=AC.createOscillator(),g2=mkGain(0.14);
  o.type='sawtooth';
  o.frequency.setValueAtTime(280,now+0.02);
  o.frequency.exponentialRampToValueAtTime(80,now+0.38);
  g2.gain.setValueAtTime(0.14,now+0.02);
  g2.gain.exponentialRampToValueAtTime(0.0001,now+0.4);
  o.connect(g2);o.start(now+0.02);o.stop(now+0.42);
}

function sfxStomp(){
  if(!AC||muted) return;
  const now=AC.currentTime;
  const o=AC.createOscillator(),g=mkGain(0.28);
  o.type='sine';
  o.frequency.setValueAtTime(130,now);
  o.frequency.exponentialRampToValueAtTime(40,now+0.16);
  g.gain.setValueAtTime(0.28,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.18);
  o.connect(g);o.start(now);o.stop(now+0.2);
  playNote(880,0.08,0.10,'square',0.02);
}

// ── Background Music ─────────────────────────────────────
// Cute chiptune loop: melody + bass + hi-hat percussion
// All generated with Web Audio oscillators — no files needed

const MELODY=[
  [523,0.18],[659,0.18],[784,0.18],[880,0.18],[784,0.18],[659,0.18],[523,0.36],
  [440,0.18],[523,0.18],[659,0.18],[784,0.18],[659,0.18],[523,0.18],[440,0.36],
  [523,0.12],[587,0.12],[659,0.12],[784,0.12],[880,0.12],[1047,0.24],[880,0.12],[784,0.36],
  [659,0.18],[587,0.18],[523,0.18],[440,0.18],[392,0.18],[330,0.18],[262,0.54],
];
const BASS=[
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[220,0.36],
  [131,0.36],[165,0.36],[196,0.36],[110,0.72],
];

function schedMelody(notes,startT,vol,type){
  if(!AC||muted) return 0;
  let t=startT;
  for(const[freq,dur]of notes){
    const o=AC.createOscillator(),g=mkGain(vol);
    o.type=type;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t);
    g.gain.setValueAtTime(vol,t+dur-0.02);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);o.start(t);o.stop(t+dur+0.01);
    bgmNodes.push(o);
    t+=dur;
  }
  return t;
}

function startBGM(){
  if(!AC||muted||bgmRunning) return;
  bgmRunning=true;
  loopBGM();
}

function loopBGM(){
  if(!AC||muted){bgmRunning=false;return;}
  const now=AC.currentTime;
  const end=schedMelody(MELODY,now,0.09,'triangle');
  schedMelody(BASS,now,0.07,'sine');
  // Hi-hat: short noise bursts on beat
  const beats=8;
  for(let b=0;b<beats;b++){
    const bt=now+b*(end-now)/beats;
    const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*0.035),AC.sampleRate);
    const dd=buf.getChannelData(0);
    for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1)*Math.pow(1-i/dd.length,2);
    const src=AC.createBufferSource(),g=mkGain(0.04);
    src.buffer=buf;src.connect(g);src.start(bt);
    bgmNodes.push(src);
  }
  const loopMs=(end-now)*1000-80;
  bgmTimer=setTimeout(()=>{ if(!muted&&bgmRunning) loopBGM(); else bgmRunning=false; },loopMs);
}

function stopBGM(){
  bgmRunning=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
  bgmNodes.forEach(n=>{try{n.stop();}catch(e){}});
  bgmNodes=[];
}

const portal={x:5640,y:GY-60,w:52,h:60,at:0};

// ── Player ────────────────────────────────────────────────
let P={};
function resetP(){
  P={
    x:spawnX, y:spawnY,
    vx:0,vy:0,w:PW,h:PH,
    onG:false,cj:true,fr:true,
    inv:0,alive:true,dt:0,tw:0
  };
}
resetP();

function buildLevel(){
  spawnX=50; spawnY=GY-PH-1;
  buildCheckpoints();
  enemies=EDEFS.map(d=>{
    const p=PLATS[d.pi];if(!p)return null;
    return{x:p.x+d.ox,y:p.y-EH,w:EW,h:EH,vx:ESPD*d.d,
           px:p.x,pw:p.w,alive:true,
           rot:Math.random()*Math.PI*2,
           rs:(0.025+Math.random()*0.03)*(Math.random()<.5?1:-1),
           col:PCOL[Math.floor(Math.random()*PCOL.length)]};
  }).filter(Boolean);
  snacks=SDEFS.map(s=>({x:s.x,y:s.y,w:SW,h:SH,type:s.t,done:false,bob:Math.random()*Math.PI*2}));
  portal.at=0;
}
buildLevel();

// ── Physics ───────────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function resolveP(e){
  e.onG=false;
  for(const p of PLATS){
    if(!overlap(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h))continue;
    const ol=(e.x+e.w)-p.x,or2=(p.x+p.w)-e.x,ot=(e.y+e.h)-p.y,ob=(p.y+p.h)-e.y;
    if(Math.min(ot,ob)<Math.min(ol,or2)){
      if(ot<ob){e.y=p.y-e.h;if(e.vy>0)e.vy=0;e.onG=true;}
      else{e.y=p.y+p.h;if(e.vy<0)e.vy=0;}
    }else{e.x=ol<or2?p.x-e.w:p.x+p.w;e.vx=0;}
  }
}

// ── Damage / respawn ──────────────────────────────────────
function dmg(){
  if(P.inv>0||!P.alive)return;
  sfxHiss();          // 😾 Angry cat hiss when hit
  lives--;hud();
  if(lives<=0){gst='gameover';stopBGM();sfxGameOver();}
  else{P.alive=false;P.dt=1400;}
}
function respawn(){
  // Respawn at last reached checkpoint (or start)
  resetP();
  P.inv=INVMS;
}

// ── Update checkpoints ────────────────────────────────────
function updCheckpoints(){
  for(const cp of checkpoints){
    if(cp.reached)continue;
    cp.animT+=0.03;
    if(P.alive&&overlap(P.x,P.y,P.w,P.h,cp.x,cp.y,cp.w,cp.h)){
      cp.reached=true;
      // Save spawn point at this checkpoint
      spawnX=cp.x;
      spawnY=cp.y;
      sfxCheckpoint();       // Chime + meow!
      showCPFlash(cp.num);   // Show UI flash
    }
  }
}

// ── Update player ─────────────────────────────────────────
let jheld=false;
function updP(dt){
  if(!P.alive){P.dt-=dt;if(P.dt<=0)respawn();return;}
  if(P.inv>0)P.inv-=dt;
  P.tw+=dt*0.006;
  P.vx=0;
  if(isL()){P.vx=-PSPD;P.fr=false;}
  if(isR()){P.vx= PSPD;P.fr=true;}
  const jp=isJ();
  if(jp&&!jheld&&P.onG&&P.cj){P.vy=JFORCE;P.cj=false;sfxJump();}
  if(!jp){jheld=false;P.cj=true;}else jheld=true;
  const prevOnG=P.onG;
  P.vy+=GRAV;if(P.vy>16)P.vy=16;
  P.x+=P.vx;resolveP(P);
  P.y+=P.vy;resolveP(P);
  if(!prevOnG&&P.onG&&P.vy>=0)sfxLand();
  if(P.y>GY+200)dmg();
  if(P.x<0)P.x=0;if(P.x+P.w>LW)P.x=LW-P.w;
}

function updE(dt){
  for(const e of enemies){
    if(!e.alive)continue;
    e.rot+=e.rs*dt;e.x+=e.vx;
    if(e.x<=e.px||e.x+e.w>=e.px+e.pw){e.vx*=-1;e.x=Math.max(e.px,Math.min(e.x,e.px+e.pw-e.w));}
    if(!P.alive||P.inv>0)continue;
    if(overlap(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h)){
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.45){
        e.alive=false;P.vy=JFORCE*0.65;score+=5;hud();sfxStomp();
      }else dmg();
    }
  }
}

function updS(){
  for(const s of snacks){
    if(s.done)continue;
    if(P.alive&&overlap(P.x,P.y,P.w,P.h,s.x,s.y,s.w,s.h)){
      s.done=true;score+=10;hud();
      sfxMeow();  // 😸 Happy cat meow when collecting snack!
    }
  }
}

function updPortal(){
  if(P.alive&&overlap(P.x,P.y,P.w,P.h,portal.x,portal.y,portal.w,portal.h)){
    gst='win';stopBGM();sfxWin();
  }
}

function updCam(){
  const sc=scl(),vw=CW/sc,vh=CH/sc;
  cam.x=Math.max(0,Math.min(P.x-vw/2+P.w/2,LW-vw));
  cam.y=Math.max(0,Math.min(P.y-vh*0.55,GY+40-vh));
}

// ── Scale helpers ─────────────────────────────────────────
function scl(){return Math.min(CW/800,CH/490);}
function wx(v){return(v-cam.x)*scl();}
function wy(v){return(v-cam.y)*scl();}
function ws(v){return v*scl();}

function rrect(x,y,w,h,r,fill,stroke,lw){
  if(w<=0||h<=0)return;r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1.5;ctx.stroke();}
}

// ── Draw background ───────────────────────────────────────
function drawBG(t){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#0e0520');g.addColorStop(0.6,'#1e0a30');g.addColorStop(1,'#2a1040');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  // Moon
  const mx=CW*0.75-(cam.x*0.04%(CW*0.3));
  const my=CH*0.17,mr=ws(33);
  const mg=ctx.createRadialGradient(mx,my,mr*0.1,mx,my,mr);
  mg.addColorStop(0,'#fffae0');mg.addColorStop(0.7,'#ffe880');mg.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
  // Stars
  const stars=[[60,28],[200,45],[350,18],[490,60],[650,32],[780,55],[120,100],[280,85],[450,115],[610,78],[40,155],[220,135],[400,158]];
  const px2=cam.x*0.10;
  for(const[sx,sy]of stars){
    const tw=0.35+0.65*Math.abs(Math.sin(t*0.0004+sx*0.1));
    ctx.globalAlpha=tw;ctx.fillStyle='#fff';
    for(let ti=0;ti<6;ti++){const rx=((sx+ti*900-px2)%CW+CW)%CW;ctx.beginPath();ctx.arc(rx,sy,1.1,0,Math.PI*2);ctx.fill();}
  }
  ctx.globalAlpha=1;
  // Trees
  const gmx=cam.x*0.15;
  ctx.fillStyle='rgba(38,12,62,0.5)';
  for(let i=0;i<14;i++){
    const bx=i*420;
    const rx=((bx-gmx%(LW+420))%(CW+440)+CW+440)%(CW+440)-220;
    const bh=48+(i%3)*16;
    ctx.fillRect(rx-3,CH-bh,6,bh);
    ctx.beginPath();ctx.moveTo(rx-16,CH-bh+6);ctx.lineTo(rx,CH-bh-22);ctx.lineTo(rx+16,CH-bh+6);ctx.closePath();ctx.fill();
  }
}

// ── Draw checkpoints ──────────────────────────────────────
function drawCheckpoints(t){
  for(const cp of checkpoints){
    const sx=wx(cp.x), sy=wy(cp.y);
    if(sx+ws(cp.w)<0||sx>CW) continue;

    const reached=cp.reached;
    const flagColor = reached ? '#44dd88' : '#ffdd44';
    const poleColor = reached ? '#33aa66' : '#ccaa33';

    // Pole
    ctx.strokeStyle=poleColor; ctx.lineWidth=ws(2.5); ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(sx+ws(cp.w/2), sy+ws(cp.h));
    ctx.lineTo(sx+ws(cp.w/2), sy);
    ctx.stroke();

    // Flag wave animation
    const wave = reached ? 0 : Math.sin(t*0.004+cp.animT)*ws(2);
    ctx.fillStyle=flagColor;
    ctx.strokeStyle=poleColor; ctx.lineWidth=ws(1);
    ctx.beginPath();
    ctx.moveTo(sx+ws(cp.w/2), sy);
    ctx.lineTo(sx+ws(cp.w/2)+ws(14)+wave, sy+ws(5));
    ctx.lineTo(sx+ws(cp.w/2)+ws(12)+wave*0.5, sy+ws(12));
    ctx.lineTo(sx+ws(cp.w/2), sy+ws(12));
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Number on flag
    ctx.fillStyle = reached ? '#fff' : '#333';
    ctx.font=`bold ${ws(7)}px Georgia`;ctx.textAlign='center';
    ctx.fillText(cp.num, sx+ws(cp.w/2)+ws(8)+wave*0.3, sy+ws(9));

    // Base
    rrect(sx+ws(cp.w/2)-ws(6), sy+ws(cp.h)-ws(4), ws(12), ws(5), ws(2), poleColor);

    // Glow if not yet reached
    if(!reached){
      ctx.strokeStyle='rgba(255,220,60,0.3)'; ctx.lineWidth=ws(6);
      ctx.beginPath(); ctx.arc(sx+ws(cp.w/2), sy+ws(cp.h/2), ws(18), 0, Math.PI*2); ctx.stroke();
    }
    // Green checkmark if reached
    if(reached){
      ctx.fillStyle='rgba(80,255,150,0.25)';
      ctx.beginPath(); ctx.arc(sx+ws(cp.w/2), sy+ws(cp.h/2), ws(14), 0, Math.PI*2); ctx.fill();
    }
  }
}

// ── Draw platforms ────────────────────────────────────────
function drawPlats(){
  for(const p of PLATS){
    const sx=wx(p.x),sy=wy(p.y),sw=ws(p.w),sh=ws(p.h);
    if(sx+sw<0||sx>CW)continue;
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(sx+3,sy+5,sw,sh);
    rrect(sx,sy,sw,sh,5,p.c,'rgba(0,0,0,0.3)');
    ctx.fillStyle='rgba(255,200,230,0.15)';ctx.fillRect(sx+4,sy+3,sw-8,3);
    if(p.h===28){
      ctx.fillStyle='rgba(255,155,200,0.38)';
      for(let i=22;i<p.w-22;i+=48){
        const gx=wx(p.x+i),gy=sy+7;
        if(gx<0||gx>CW)continue;
        ctx.beginPath();ctx.arc(gx,gy,ws(3),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(gx-ws(3.8),gy-ws(2.8),ws(1.6),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(gx+ws(3.8),gy-ws(2.8),ws(1.6),0,Math.PI*2);ctx.fill();
      }
    }
  }
}

// ── Draw pill enemies ─────────────────────────────────────
function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    const sx=wx(e.x),sy=wy(e.y),sw=ws(e.w),sh=ws(e.h);
    if(sx+sw<0||sx>CW)continue;
    ctx.save();ctx.translate(sx+sw/2,sy+sh/2);ctx.rotate(e.rot);
    const pr=ws(8.5),ph=ws(12);
    ctx.fillStyle='#f2f2f2';
    ctx.beginPath();ctx.arc(0,-ph/2,pr,Math.PI,0);ctx.rect(-pr,-ph/2,pr*2,ph);ctx.arc(0,ph/2,pr,0,Math.PI);ctx.fill();
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.arc(0,ph/2,pr,0,Math.PI);ctx.rect(-pr,0,pr*2,ph/2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=ws(1.2);
    ctx.beginPath();ctx.moveTo(-pr,0);ctx.lineTo(pr,0);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=ws(1.2);
    ctx.beginPath();ctx.arc(0,-ph/2,pr,Math.PI,0);ctx.lineTo(pr,ph/2);ctx.arc(0,ph/2,pr,0,Math.PI);ctx.lineTo(-pr,-ph/2);ctx.stroke();
    ctx.strokeStyle=e.col+'66';ctx.lineWidth=ws(2.5);
    ctx.beginPath();ctx.arc(0,0,pr*1.15,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ── Draw snacks ───────────────────────────────────────────
function drawSnacks(t){
  for(const s of snacks){
    if(s.done)continue;
    const sx=wx(s.x),sy=wy(s.y);
    if(sx+ws(s.w)<0||sx>CW)continue;
    const bob=Math.sin(s.bob+t*0.002)*ws(2.5);
    const cx2=sx+ws(s.w)/2,cy2=sy+ws(s.h)/2+bob;
    ctx.save();ctx.translate(cx2,cy2);
    if(s.type===0){
      // Fish
      ctx.shadowColor='#40c0ff';ctx.shadowBlur=ws(7);
      const fg=ctx.createRadialGradient(-ws(1),0,ws(1),0,0,ws(8));
      fg.addColorStop(0,'#b0eeff');fg.addColorStop(1,'#1890c0');
      ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,ws(8),ws(5),0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1880b0';ctx.beginPath();ctx.moveTo(ws(7),0);ctx.lineTo(ws(12),-ws(4));ctx.lineTo(ws(12),ws(4));ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-ws(4.5),-ws(1),ws(1.4),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-ws(4.1),-ws(1.4),ws(0.6),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.ellipse(-ws(2),-ws(1),ws(2),ws(1),0.5,0,Math.PI*2);ctx.fill();
    }else{
      // Star snack
      ctx.shadowColor='#ffdd00';ctx.shadowBlur=ws(9);
      ctx.fillStyle='#ffe020';ctx.strokeStyle='#ffaa00';ctx.lineWidth=ws(1.2);
      ctx.beginPath();
      for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,r=i%2===0?ws(9):ws(4.5);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,200,0.65)';ctx.beginPath();ctx.arc(0,0,ws(2.5),0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ── Draw portal ───────────────────────────────────────────
function drawPortal(t){
  const sx=wx(portal.x),sy=wy(portal.y),sw=ws(portal.w),sh=ws(portal.h);
  if(sx+sw<0||sx>CW)return;
  const pls=Math.sin(portal.at+t*0.002)*0.08+1;
  ctx.save();ctx.translate(sx+sw/2,sy+sh/2+sh*0.1);
  ctx.strokeStyle='rgba(255,180,80,0.13)';ctx.lineWidth=ws(16);
  ctx.beginPath();ctx.ellipse(0,0,sw*0.72*pls,sh*0.46*pls,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#d4b040';ctx.strokeStyle='#b09030';ctx.lineWidth=ws(2.5);
  ctx.beginPath();ctx.ellipse(0,sh*0.1,sw*0.68*pls,sh*0.4*pls,0,0,Math.PI);ctx.fill();ctx.stroke();
  ctx.fillStyle='#f0d060';ctx.strokeStyle='#c0a030';ctx.lineWidth=ws(2);
  ctx.beginPath();ctx.ellipse(0,sh*0.1,sw*0.68*pls,sh*0.17*pls,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#d06828';ctx.beginPath();ctx.ellipse(0,sh*0.04,sw*0.48*pls,sh*0.13*pls,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<3;i++){
    const ux=(i-1)*sw*0.2,uoff=Math.sin(t*0.003+i*1.2)*ws(3);
    ctx.strokeStyle=`rgba(255,235,190,${0.38-i*0.05})`;ctx.lineWidth=ws(2.2);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ux,-sh*0.06);ctx.quadraticCurveTo(ux+ws(7)+uoff,-sh*0.26,ux+uoff*0.4,-sh*0.42);ctx.stroke();
  }
  ctx.shadowColor='#ff8800';ctx.shadowBlur=ws(8);
  ctx.fillStyle='#fff';ctx.font=`bold ${ws(9)}px Georgia`;ctx.textAlign='center';
  ctx.fillText('FINISH! 🎉',0,sh*0.5+ws(13));ctx.shadowBlur=0;ctx.restore();
}

// ── Draw Mimi ─────────────────────────────────────────────
function drawMimi(t){
  if(!P.alive)return;
  if(P.inv>0&&Math.floor(t/80)%2===0)return;
  const cx2=wx(P.x)+ws(P.w/2),cy2=wy(P.y)+ws(P.h/2);
  const dir=P.fr?1:-1,mov=Math.abs(P.vx)>0.1;
  ctx.save();ctx.translate(cx2,cy2);ctx.scale(dir,1);
  // Tail
  const tw=Math.sin(P.tw)*(mov?0.5:0.22);
  ctx.strokeStyle='#dcdcdc';ctx.lineWidth=ws(4.5);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-ws(10),ws(5));ctx.quadraticCurveTo(-ws(18),ws(5)-ws(13)*Math.cos(tw),-ws(13)+Math.sin(tw)*ws(9),ws(5)-ws(19));ctx.stroke();
  ctx.strokeStyle='#c8c8c8';ctx.lineWidth=ws(6.5);ctx.beginPath();ctx.moveTo(-ws(10),ws(5));ctx.lineTo(-ws(12),ws(1));ctx.stroke();
  // Body
  ctx.fillStyle='#f8f8f8';ctx.strokeStyle='#d8d8d8';ctx.lineWidth=ws(0.9);
  ctx.beginPath();ctx.ellipse(0,ws(5),ws(11),ws(10),0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Head
  ctx.fillStyle='#ffffff';ctx.strokeStyle='#ddd';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.arc(0,-ws(9),ws(12),0,Math.PI*2);ctx.fill();ctx.stroke();
  // Ears
  ctx.fillStyle='#f2f2f2';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.moveTo(-ws(9),-ws(18));ctx.lineTo(-ws(14),-ws(27));ctx.lineTo(-ws(3),-ws(21));ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffb0ca';ctx.beginPath();ctx.moveTo(-ws(9.5),-ws(19));ctx.lineTo(-ws(13),-ws(25.5));ctx.lineTo(-ws(4),-ws(21.5));ctx.closePath();ctx.fill();
  ctx.fillStyle='#f2f2f2';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.moveTo(ws(9),-ws(18));ctx.lineTo(ws(14),-ws(27));ctx.lineTo(ws(3),-ws(21));ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffb0ca';ctx.beginPath();ctx.moveTo(ws(9.5),-ws(19));ctx.lineTo(ws(13),-ws(25.5));ctx.lineTo(ws(4),-ws(21.5));ctx.closePath();ctx.fill();
  // Eyes (bigger when airborne)
  const ew=P.onG?ws(3.2):ws(4.3),eh=P.onG?ws(3.8):ws(5);
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.ellipse(-ws(4.5),-ws(10),ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ws(4.5),-ws(10),ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-ws(3.8),-ws(11.2),ws(1.2),0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ws(5.2),-ws(11.2),ws(1.2),0,Math.PI*2);ctx.fill();
  // Nose
  ctx.fillStyle='#ffaacc';ctx.beginPath();ctx.arc(0,-ws(7.5),ws(1.6),0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.strokeStyle='#aaa';ctx.lineWidth=ws(0.9);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-ws(2.5),-ws(6));ctx.quadraticCurveTo(0,-ws(4.5),ws(2.5),-ws(6));ctx.stroke();
  // Whiskers
  ctx.strokeStyle='rgba(120,120,120,0.45)';ctx.lineWidth=ws(0.7);
  ctx.beginPath();ctx.moveTo(-ws(2),-ws(7.5));ctx.lineTo(-ws(12),-ws(6));ctx.stroke();
  ctx.beginPath();ctx.moveTo(-ws(2),-ws(7));ctx.lineTo(-ws(12),-ws(8.5));ctx.stroke();
  ctx.beginPath();ctx.moveTo(ws(2),-ws(7.5));ctx.lineTo(ws(12),-ws(6));ctx.stroke();
  ctx.beginPath();ctx.moveTo(ws(2),-ws(7));ctx.lineTo(ws(12),-ws(8.5));ctx.stroke();
  // Legs
  const lo=mov?Math.sin(t*0.015)*ws(3.2):0;
  ctx.fillStyle='#efefef';ctx.strokeStyle='#ccc';ctx.lineWidth=ws(0.8);
  ctx.beginPath();ctx.ellipse(-ws(5),ws(14)+lo,ws(4),ws(3.5),0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(ws(5),ws(14)-lo,ws(4),ws(3.5),-0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Spots
  ctx.fillStyle='rgba(195,195,195,0.28)';
  ctx.beginPath();ctx.ellipse(ws(5),ws(3),ws(4),ws(3),0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-ws(4),ws(7),ws(3),ws(2.5),-0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Draw overlays ─────────────────────────────────────────
function drawOverlay(title,sub,hint){
  ctx.fillStyle='rgba(8,2,18,0.90)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';
  ctx.shadowColor='#ff50a0';ctx.shadowBlur=22;
  ctx.fillStyle='#ffd0e8';
  ctx.font=`bold ${Math.min(CW*0.072,50)}px Georgia`;
  ctx.fillText(title,CW/2,CH/2-50);ctx.shadowBlur=0;
  ctx.fillStyle='#c090b0';
  ctx.font=`${Math.min(CW*0.038,21)}px Georgia`;
  ctx.fillText(sub,CW/2,CH/2+4);
  ctx.fillStyle='#806070';
  ctx.font=`${Math.min(CW*0.026,15)}px Georgia`;
  ctx.fillText(hint,CW/2,CH/2+38);
  const bw=Math.min(250,CW*0.62),bh=50,bx=CW/2-bw/2,by=CH/2+65;
  rrect(bx,by,bw,bh,12,'rgba(148,32,92,0.88)','rgba(255,115,178,0.58)',2);
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(CW*0.034,18)}px Georgia`;
  ctx.fillText('🐾 TAP UNTUK MAIN LAGI',CW/2,by+32);
}

function drawTitle(){
  drawBG(0);
  ctx.fillStyle='rgba(6,1,15,0.80)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';
  ctx.shadowColor='#ff60b0';ctx.shadowBlur=26;
  ctx.fillStyle='#ffd8ee';
  ctx.font=`bold ${Math.min(CW*0.09,58)}px Georgia`;
  ctx.fillText('Mimi Adventure',CW/2,CH*0.22);ctx.shadowBlur=0;
  // Cat illustration
  const sc2=Math.min(CW/340,CH/250)*0.85;
  ctx.save();ctx.translate(CW/2,CH*0.46);ctx.scale(sc2,sc2);
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(0,10,18,16,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,-14,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.moveTo(-16,-30);ctx.lineTo(-22,-44);ctx.lineTo(-6,-36);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(16,-30);ctx.lineTo(22,-44);ctx.lineTo(6,-36);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffb8cc';
  ctx.beginPath();ctx.moveTo(-15,-31);ctx.lineTo(-20,-43);ctx.lineTo(-7,-36);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(15,-31);ctx.lineTo(20,-43);ctx.lineTo(7,-36);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.arc(-8,-16,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-16,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-6.5,-17.5,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9.5,-17.5,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff99bb';ctx.beginPath();ctx.arc(0,-9.5,2.8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aaa';ctx.lineWidth=1.6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-4,-6);ctx.quadraticCurveTo(0,-3,4,-6);ctx.stroke();
  ctx.strokeStyle='#ddd';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(-16,12);ctx.quadraticCurveTo(-28,2,-22,-12);ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#a070a0';
  ctx.font=`${Math.min(CW*0.034,17)}px Georgia`;
  ctx.fillText('Kumpulkan 🐟 ikan & ⭐ snack',CW/2,CH*0.63);
  ctx.fillText('Hindari 💊 pil obat! Injak dari atas untuk kalahkan!',CW/2,CH*0.70);
  ctx.fillStyle='#7a5878';
  ctx.font=`${Math.min(CW*0.026,13)}px Georgia`;
  ctx.fillText('🏁 Ada 5 checkpoint — Mimi tidak perlu mulai dari awal!',CW/2,CH*0.77);
  const bw=Math.min(200,CW*0.52),bh=54,bx=CW/2-bw/2,by=CH*0.83;
  rrect(bx,by,bw,bh,14,'rgba(145,32,92,0.92)','rgba(255,128,185,0.55)',2);
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(CW*0.042,23)}px Georgia`;
  ctx.fillText('▶  MAIN!',CW/2,by+37);
  ctx.fillStyle='rgba(160,120,150,0.5)';
  ctx.font=`${Math.min(CW*0.022,12)}px Georgia`;
  ctx.fillText('🔊 Musik aktif setelah tap — gunakan 🔊 untuk mute',CW/2,CH*0.97);
}

// ── Restart ───────────────────────────────────────────────
function restart(){
  score=0;lives=3;gst='playing';
  hud();buildLevel();resetP();cam.x=0;cam.y=0;
  stopBGM();
  setTimeout(()=>{ if(!muted) startBGM(); },150);
}

// Main tap/click handler
// CRITICAL: ensureAC() and resumeAC() must be called HERE
// inside the actual user gesture event, not in a setTimeout
function handleTap(e){
  e.preventDefault();
  ensureAC();   // Create AudioContext on first gesture (iOS requirement)
  resumeAC();   // Resume if suspended (iOS background tab)
  if(gst==='title'||gst==='gameover'||gst==='win') restart();
}
canvas.addEventListener('touchstart',handleTap,{passive:false});
canvas.addEventListener('click',handleTap);
window.addEventListener('keydown',e=>{
  ensureAC();resumeAC();
  if((gst==='title'||gst==='gameover'||gst==='win')&&e.code==='KeyR') restart();
});

function setCtrl(v){document.getElementById('controls').style.display=v?'flex':'none';}

// ── Main loop ─────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,50);last=ts;
  if(gst==='title'){setCtrl(false);drawTitle();requestAnimationFrame(loop);return;}
  setCtrl(true);
  if(gst==='playing'){
    portal.at+=dt*0.002;
    updP(dt);updE(dt);updS();updCheckpoints();updPortal();updCam();
  }
  ctx.clearRect(0,0,CW,CH);
  drawBG(ts);
  drawCheckpoints(ts);  // Draw flags behind platforms
  drawPlats();
  drawPortal(ts);
  drawSnacks(ts);
  drawEnemies();
  drawMimi(ts);
  if(!P.alive&&P.dt>0){
    ctx.fillStyle=`rgba(255,50,80,${Math.min(0.4,P.dt/4000)})`;ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.font=`bold ${Math.min(CW*0.046,26)}px Georgia`;
    ctx.fillText('Mimi jatuh... 😿',CW/2,CH/2-16);
    // Show respawn location
    const cpReached=checkpoints.filter(c=>c.reached);
    const cpInfo=cpReached.length>0?`Respawn di Checkpoint ${cpReached[cpReached.length-1].num}`:'Respawn dari awal';
    ctx.font=`${Math.min(CW*0.030,16)}px Georgia`;
    ctx.fillStyle='rgba(255,200,200,0.85)';
    ctx.fillText(cpInfo,CW/2,CH/2+14);
  }
  if(gst==='gameover'){
    setCtrl(false);
    drawOverlay('GAME OVER 😿',`Skor: ${score}  ·  Snack: ${score/10|0}`,'Ayo coba lagi, Mimi bisa!');
  }
  if(gst==='win'){
    setCtrl(false);
    drawOverlay('MIMI MENANG! 😸🎉',`Skor: ${score}  ·  Snack: ${score/10|0} 🐟`,'Nyam nyam! Semua snack habis!');
  }
  requestAnimationFrame(loop);
}

// ── Init ─────────────────────────────────────────────────
function init(){
  resize();
  if(CW<10||CH<10){CW=canvas.width=375;CH=canvas.height=667;}
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  document.addEventListener('touchstart',e=>{if(e.target===document.body)e.preventDefault();},{passive:false});
  requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});
}
if(document.readyState==='complete'){init();}
else{window.addEventListener('load',init);}
window.addEventListener('resize',()=>resize());
window.addEventListener('orientationchange',()=>setTimeout(resize,200));
</script>
